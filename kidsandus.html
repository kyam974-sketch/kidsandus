.level-pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

.level-block { margin-bottom: 18px; }

.add-row { display: flex; gap: 8px; }

.note-txt { background: #f9fafb; border: 1px solid #e5e7eb; }
.save-btn { width: 100%; background: #059669; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; margin-top: 4px; }

let state = {

  selectedGroup: null,

  students: [],

};

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}
function persist(newData) {
  state.allData = newData;
  saveData(newData);
}

function getCurriculumObjectives(char, story, day) {
  const key = CURRICULUM_KEY[char];
  if (!key || !story || !day) return [];
  return CURRICULUM[key]?.[story]?.lessons?.[day] || [];
}

function fmtDate(iso) {
  const [y, m, d] = iso.split("-"); return `${d}/${m}/${y}`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (state.view === "home") renderHome(app);
  else if (state.view === "session") renderSession(app);
  else if (state.view === "history") renderHistory(app);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") {
        Object.assign(e.style, v);
      } else if (k.startsWith("on") && typeof v === "function") {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === "class") {
        e.className = v;
      } else if (k === "disabled") {
        if (v) e.disabled = true;
      } else if (k === "rows") {
        e.rows = v;
      } else if (k === "placeholder") {
        e.placeholder = v;
      } else if (k === "value" && (tag === "textarea" || tag === "input")) {
        e.value = v;
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string" || typeof c === "number") {
      e.appendChild(document.createTextNode(c));
    } else if (c instanceof Node) {
      e.appendChild(c);
    } else if (Array.isArray(c)) {
      c.forEach(cc => { if (cc instanceof Node) e.appendChild(cc); });
    }
  }
  return e;
}

function renderHome(root) {
  const header = el("div", { class: "header" },
    el("span", { class: "logo-text" }, "🐭 Kids&Us Follow-Up"),
    el("button", { class: "btn-header", onClick: () => { state.view = "history"; render(); } }, "📋 Storico")
  );

  const body = el("div", { class: "home-body" });
  for (const level of LEVELS) {
    const lc = LEVEL_COLORS[level];
    const groups = GROUPS.filter(g => g.level === level);
    const block = el("div", { class: "level-block" });
    const label = el("div", { class: "level-label",
      style: { background: lc.bg, color: lc.text, borderColor: lc.border } }, level);
    const pills = el("div", { class: "group-pills" });
    groups.forEach(g => {
      const btn = el("button", {
        class: "group-pill",
        style: { background: g.color },
        onClick: () => {
          state.selectedGroup = g;
          const gd = state.allData[g.id] || {};
          state.students = gd.students || [];
          state.presentStudents = [...(gd.students || [])];
          state.selectedStory = gd.lastStory || "";
          state.selectedDay = gd.lastDay || "";
          state.groupNote = "";
          state.individualNotes = {};
          state.generated = false;
          state.saved = false;
          state.newStudent = "";
          state.view = "session";
          render();
        }
      }, g.name);
      pills.appendChild(btn);
    });
    block.append(label, pills);
    body.appendChild(block);
  }

  const page = el("div", {}, header, body);
  root.appendChild(page);
}

function renderSession(root) {
  const g = state.selectedGroup;

  const charKey = CURRICULUM_KEY[g.char];
  const currStories = charKey ? Object.keys(CURRICULUM[charKey] || {}) : [];
  const currDays = (charKey && state.selectedStory)
    ? Object.keys(CURRICULUM[charKey]?.[state.selectedStory]?.lessons || {})
        .sort((a, b) => parseInt(a.split(" ")[1]) - parseInt(b.split(" ")[1]))

    el("button", { class: "btn-header", onClick: () => { state.view = "home"; render(); } }, "← Home"),

    el("span", { class: "logo-text" }, g.name)
  );

  const body = el("div", { class: "body" });

  // LESSON CARD
  const lessonCard = el("div", { class: "card" },
    el("div", { class: "card-title" }, "📖 Lezione")

  } else {
    const storySelect = el("select", {});
    storySelect.innerHTML = '<option value="">— Storia / Part —</option>';
    currStories.forEach(s => {
      const title = CURRICULUM[charKey][s].title;
      const label = title !== s ? `${s} · ${title}` : s;
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = label;
      if (s === state.selectedStory) opt.selected = true;
      storySelect.appendChild(opt);
    });
    storySelect.addEventListener("change", () => {
      state.selectedStory = storySelect.value;
      state.selectedDay = "";
      state.generated = false;
      render();
    });

    const daySelect = el("select", {});
    daySelect.innerHTML = '<option value="">— Day —</option>';
    if (!state.selectedStory) daySelect.disabled = true;
    currDays.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d; opt.textContent = d;
      if (d === state.selectedDay) opt.selected = true;
      daySelect.appendChild(opt);

    daySelect.addEventListener("change", () => {
      state.selectedDay = daySelect.value;
      state.generated = false;
      render();
    });

    const row = el("div", { class: "row" }, storySelect, daySelect);

    if (objectives.length > 0) {

      objectives.forEach(o => objBox.appendChild(el("div", { class: "obj-item" }, "• " + o)));
      lessonCard.appendChild(objBox);

  // STUDENTS CARD

  );

  state.students.forEach(name => {
    const present = state.presentStudents.includes(name);
    const btn = el("button", {
      class: "pres-btn " + (present ? "present" : "absent"),
      onClick: () => {
        if (present) state.presentStudents = state.presentStudents.filter(s => s !== name);
        else state.presentStudents = [...state.presentStudents, name];
        state.generated = false;
        render();
      }
    }, (present ? "✓" : "✗") + " " + name);
    const del = el("button", { class: "del-btn", onClick: () => {
      state.students = state.students.filter(s => s !== name);
      state.presentStudents = state.presentStudents.filter(s => s !== name);
      const gd = state.allData[g.id] || {};
      persist({ ...state.allData, [g.id]: { ...gd, students: state.students } });
      render();
    }}, "×");
    grid.appendChild(el("div", { class: "student-item" }, btn, del));
  });
  const addInput = el("input", { type: "text", placeholder: "Aggiungi allievo...", value: state.newStudent });
  addInput.addEventListener("input", e => { state.newStudent = e.target.value; });
  addInput.addEventListener("keydown", e => { if (e.key === "Enter") doAddStudent(g); });
  const addBtn = el("button", { class: "add-btn", onClick: () => doAddStudent(g) }, "+");
  studCard.append(grid, el("div", { class: "add-row" }, addInput, addBtn));

  // GROUP NOTE CARD

  ta.value = state.groupNote;
  ta.addEventListener("input", e => { state.groupNote = e.target.value; state.generated = false; });
  const canGenerate = state.groupNote.trim() && state.presentStudents.length > 0 && !state.generating;

    );

function renderHistory(root) {
  const header = el("div", { class: "header" },
    el("button", { class: "btn-header", onClick: () => { state.view = "home"; state.historyGroup = null; render(); } }, "← Home"),
    el("span", { class: "logo-text" }, "📋 Storico")
  );
  const body = el("div", { class: "body" });

  if (!state.historyGroup) {
    const withHist = GROUPS.filter(g => (state.allData[g.id]?.history || []).length > 0);
    if (withHist.length === 0) {
      body.appendChild(el("p", { class: "empty" }, "Nessuno storico salvato."));
    } else {
      const pills = el("div", { class: "group-pills" });
      withHist.forEach(g => {
        const btn = el("button", {
          class: "group-pill",
          style: { background: g.color },
          onClick: () => { state.historyGroup = g; render(); }
        }, `${g.name} (${(state.allData[g.id]?.history || []).length})`);
        pills.appendChild(btn);
      });
      body.appendChild(pills);
    }
  } else {
    const hg = state.historyGroup;
    body.appendChild(el("button", { class: "btn-back-sm", onClick: () => { state.historyGroup = null; render(); } }, "← Gruppi"));
    body.appendChild(el("h2", { class: "history-title" }, hg.name));
    const entries = state.allData[hg.id]?.history || [];
    entries.forEach((entry, i) => {
      const card = el("div", { class: "history-card" });
      const meta = el("div", { class: "history-meta" }, fmtDate(entry.date));
      if (entry.story) meta.appendChild(el("span", { class: "history-tag" }, `${entry.story} — ${entry.day}`));
      card.appendChild(meta);
      card.appendChild(el("div", { class: "history-group-note" }, "📝 " + entry.groupNote));
      card.appendChild(el("div", { class: "history-present" }, "Presenti: " + (entry.presentStudents || []).join(", ")));
      Object.entries(entry.individualNotes || {}).forEach(([name, note]) => {
        const row = el("div", { class: "history-row" });
        row.innerHTML = `<strong>${name}:</strong> ${note}`;
        card.appendChild(row);
      });
      body.appendChild(card);
    });
  }
  root.append(header, body);
}

function doAddStudent(g) {
  const name = state.newStudent.trim();
  if (!name || state.students.includes(name)) return;
  state.students = [...state.students, name];
  state.presentStudents = [...state.presentStudents, name];
  state.newStudent = "";
  const gd = state.allData[g.id] || {};
  persist({ ...state.allData, [g.id]: { ...gd, students: state.students } });
  render();
}

      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).map(b => b.text || "").join("");
    try { state.individualNotes = JSON.parse(text.trim()); } catch { state.individualNotes = {}; }
    state.generated = true;
  } catch (e) {
    state.individualNotes = {};
    state.generated = true;
  }

  state.generating = false;
  render();
}

function handleSave() {
  const g = state.selectedGroup;
  const today = new Date().toISOString().split("T")[0];
  const gd = state.allData[g.id] || {};
  const history = gd.history || [];
  const entry = {
    date: today,
    story: state.selectedStory,
    day: state.selectedDay,
    groupNote: state.groupNote,
    presentStudents: state.presentStudents,
    individualNotes: state.individualNotes
  };
  persist({ ...state.allData, [g.id]: { ...gd, students: state.students, lastStory: state.selectedStory, lastDay: state.selectedDay, history: [entry, ...history] } });
  state.saved = true;
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
